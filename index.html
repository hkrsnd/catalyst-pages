<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Catalyst Lab Reports</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563EB;--green:#16A34A;--amber:#D97706;--purple:#7C3AED;--red:#DC2626;
  --bg:#F0F2F5;--card:#FFFFFF;--border:#E2E8F0;--text:#1E293B;--text-muted:#64748B;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;
  max-width:900px;margin:0 auto;padding:32px 20px 80px}

/* Header */
.page-header{background:linear-gradient(135deg,#1E293B 0%,#334155 100%);color:#fff;
  padding:40px 44px;border-radius:20px;margin-bottom:36px;text-align:center}
.page-header h1{font-size:2rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px}
.page-header p{opacity:0.7;font-size:0.95rem}

/* Experiment cards */
.exp-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:28px 32px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);
  transition:box-shadow 0.2s}
.exp-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.exp-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.exp-header h2{font-size:1.3rem;font-weight:700}
.domain-pill{background:#EEF2FF;color:var(--blue);padding:3px 12px;border-radius:14px;
  font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.exp-desc{color:var(--text-muted);font-size:0.9rem;margin-bottom:16px}

/* Stats row */
.exp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{text-align:center;padding:10px 8px;background:#F8FAFC;border-radius:10px}
.stat-value{font-size:1.25rem;font-weight:700;color:var(--text)}
.stat-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-top:2px}

/* Task links */
.exp-tasks{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tasks-label{font-size:0.8rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em}
.task-link{display:inline-block;padding:5px 14px;background:var(--blue);color:#fff;
  border-radius:8px;font-size:0.82rem;font-weight:600;text-decoration:none;
  transition:background 0.15s}
.task-link:hover{background:#1D4ED8}
.no-reports{color:var(--text-muted);font-size:0.85rem;font-style:italic}

.empty-state{text-align:center;color:var(--text-muted);padding:60px 20px;font-size:1.05rem}

/* Footer */
.page-footer{text-align:center;color:var(--text-muted);font-size:0.8rem;
  padding:24px 0;border-top:1px solid var(--border);margin-top:48px}

/* Updated timestamp */
.last-updated{text-align:center;color:var(--text-muted);font-size:0.8rem;margin-bottom:24px}
</style>
</head>
<body>
<header class="page-header">
  <h1>Catalyst Lab Reports</h1>
  <p>Multi-Agent Scientific Optimization &mdash; Experiment Dashboard</p>
</header>
